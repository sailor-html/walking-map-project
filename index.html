<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Wherever I Go Project</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
            text-align: center;
        }

        header {
            background: url('images/header.jpg') center/cover no-repeat;
            color: white;
            padding: 80px 20px;
            position: relative;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .buttons {
            margin: 20px;
        }

        .buttons button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background: #0077cc;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        .buttons button:hover {
            background: #005fa3;
        }

        .section {
            display: none;
            margin-top: 20px;
        }

        iframe {
            width: 90%;
            height: 600px;
            border: none;
            border-radius: 10px;
        }
    </style>
    <script type="module" src="https://js.arcgis.com/5.0/embeddable-components/"></script>
</head>

<body>

<header>
    <h1>My Walking & Running Map Project</h1>
    <p>Exploring movement, place, and experience through mapping</p>
</header>

<div class="container">

    <div class="buttons">
        <button onclick="showSection('arcgis')">ArcGIS Map</button>
        <button onclick="showSection('mapbox')">Photo Map</button>
        <button onclick="showSection('dashboard')">Dashboard</button>
    </div>

    <!-- ArcGIS -->
    <div id="arcgis" class="section" style="display:block;">
        <h2>ArcGIS Web Map</h2>
          <iframe 
          width="90%" 
          height="600" 
          style="border-radius:10px;"
          frameborder="0" 
          src="https://www.arcgis.com/apps/Embed/index.html?webmap=2d453bdd68a54f2bbb99955fb8050ad8">
        </iframe>
    </div>

    <!-- Mapbox -->
    <div id="mapbox" class="section">
        <h2>Interactive Photo Map</h2>
          <iframe 
            src="mapbox.html" 
            width="90%" 
            height="600" 
            style="border-radius:10px;">
          </iframe>  
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="section">
        <h2>Frequently Updated Dashboard</h2>
        <iframe src="https://www.arcgis.com/apps/dashboards/f7cd8f7791a940db9a05fba575b5f36a"></iframe>
    </div>

</div>

<script>
function showSection(id) {
    const sections = document.querySelectorAll('.section');
    sections.forEach(section => section.style.display = 'none');

    document.getElementById(id).style.display = 'block';
}
</script>

</body>
</html>
