<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>My Favorite Walk</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
<link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
<style> 
    body { margin:0; padding:0; } 
    #map { position:absolute; top:0; bottom:0; width:100%; } 
</style>
</head>
<body>
<div id="map"></div>
<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoic2FpbG9yZCIsImEiOiJjbWxneXNqdmswM282M2NwejN2aDM0dWQ3In0.OFvdgB494jYDPKV4Uv41mw';

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [-117.154, 34.061],
    zoom: 13
});

map.on('load', () => {
    // Route line
    map.addSource('route', { type: 'geojson', data: 'map.geojson' });
    map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route',
        paint: { 'line-color': '#0074D9', 'line-width': 4 }
    });

    // Photo points
    map.addSource('photos', { type: 'geojson', data: 'WhereverIGo.geojson' });
    map.addLayer({
        id: 'photo-points',
        type: 'circle',
        source: 'photos',
        paint: { 'circle-radius': 6, 'circle-color': '#FF5733' }
    });

    // Popups for photo points
    map.on('click', 'photo-points', (e) => {
        const coords = e.features[0].geometry.coordinates.slice();
        const desc = e.features[0].properties["What am I looking at?"];
        const photo = e.features[0].properties.PhotoURL;

        new mapboxgl.Popup()
            .setLngLat(coords)
            .setHTML(`<p>${desc}</p><img src="${photo}" width="200">`)
            .addTo(map);
    });

    map.on('mouseenter', 'photo-points', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'photo-points', () => map.getCanvas().style.cursor = '');
});
</script>
</body>
</html>
